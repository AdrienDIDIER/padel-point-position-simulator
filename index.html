<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What's My Ranking — Padel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #F2F5F9;
      --surface:       rgba(255,255,255,.92);
      --surface-solid: #FFFFFF;
      --surface-2:     rgba(248,250,253,.85);
      --primary:       #10B981;
      --primary-h:     #059669;
      --primary-dark:  #047857;
      --primary-glow:  rgba(16,185,129,.18);
      --primary-light: #ECFDF5;
      --primary-border:#6EE7B7;
      --blue:          #6366F1;
      --text:          #0F172A;
      --text-2:        #64748B;
      --text-3:        #94A3B8;
      --border:        rgba(226,232,240,.9);
      --error:         #EF4444;
      --error-bg:      #FEF2F2;
      --warn:          #F59E0B;
      --warn-bg:       #FFFBEB;
      --shadow:        0 2px 4px rgba(0,0,0,.04), 0 12px 40px rgba(0,0,0,.08);
      --shadow-sm:     0 1px 3px rgba(0,0,0,.06);
      --shadow-glow:   0 8px 32px rgba(16,185,129,.25);
      --r:             18px;
      --r-sm:          11px;
      --ease:          cubic-bezier(.4,0,.2,1);
      --spring:        cubic-bezier(.34,1.56,.64,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 16px 72px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    /* ── ANIMATED BACKGROUND BLOBS ── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      filter: blur(60px);
    }
    body::before {
      width: 600px; height: 600px;
      top: -150px; left: -150px;
      background: radial-gradient(circle, rgba(16,185,129,.12) 0%, transparent 70%);
      animation: blobDrift 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 500px; height: 500px;
      bottom: -100px; right: -100px;
      background: radial-gradient(circle, rgba(99,102,241,.09) 0%, transparent 70%);
      animation: blobDrift 15s ease-in-out infinite alternate-reverse;
    }
    @keyframes blobDrift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px,30px) scale(1.1); }
    }

    /* ── WRAPPER ── */
    .wrapper {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Staggered entrance for wrapper children */
    .wrapper > * {
      animation: fadeUp .55s var(--ease) both;
    }
    .wrapper > *:nth-child(1) { animation-delay: 0ms; }
    .wrapper > *:nth-child(2) { animation-delay: 90ms; }
    .wrapper > *:nth-child(3) { animation-delay: 160ms; }
    .wrapper > *:nth-child(4) { animation-delay: 200ms; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LANG BUTTON ── */
    .lang-btn {
      position: fixed;
      top: 16px; right: 16px;
      padding: 6px 13px;
      font-size: .75rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--text-2);
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 99px;
      cursor: pointer;
      transition: all .2s var(--ease);
      z-index: 100;
      letter-spacing: .3px;
    }
    .lang-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
      padding-bottom: 4px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #10B981, #059669);
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--shadow-glow);
    }
    .logo-icon svg { width: 22px; height: 22px; fill: #fff; }

    .app-name {
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.5px;
    }

    .app-sub {
      font-size: .82rem;
      color: var(--text-2);
      font-weight: 400;
    }

    .update-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 99px;
      background: var(--primary-light);
      border: 1px solid var(--primary-border);
      font-size: .74rem;
      font-weight: 500;
      color: var(--primary-dark);
      margin-top: 2px;
      transition: opacity .3s;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--primary);
      animation: pulseDot 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(.65); opacity: .45; }
    }

    /* ── MAIN CARD ── */
    .card {
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── GENDER SELECTOR ── */
    .gender-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      padding: 5px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .gender-btn {
      padding: 9px 12px;
      border: none;
      border-radius: 10px;
      font-size: .86rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      color: var(--text-3);
      background: transparent;
      transition: all .2s var(--ease);
      position: relative;
    }
    .gender-btn.active {
      background: var(--surface-solid);
      color: var(--text);
      font-weight: 600;
      box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 2px 12px rgba(0,0,0,.05);
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .tab {
      flex: 1;
      padding: 13px 8px;
      font-size: .83rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-3);
      background: none;
      border: none;
      cursor: pointer;
      transition: color .2s var(--ease);
      position: relative;
      z-index: 1;
    }
    .tab.active { color: var(--primary); font-weight: 600; }
    .tab:hover:not(.active) { color: var(--text-2); }

    /* Sliding indicator */
    .tab-indicator {
      position: absolute;
      bottom: 0;
      height: 2px;
      width: 50%;
      background: linear-gradient(90deg, var(--primary), var(--primary-h));
      border-radius: 2px 2px 0 0;
      left: 0;
      transition: left .25s var(--ease);
      pointer-events: none;
    }

    /* ── PANELS ── */
    .panel { display: none; flex-direction: column; gap: 16px; padding: 22px 24px 24px; }
    .panel.active { display: flex; }

    /* ── INPUT GROUP ── */
    .input-group { display: flex; flex-direction: column; gap: 7px; }

    label {
      font-size: .75rem;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 12px 15px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 500;
      color: var(--text);
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      outline: none;
      transition: border-color .2s var(--ease), box-shadow .2s var(--ease), background .2s var(--ease);
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3.5px rgba(16,185,129,.13);
    }
    input::placeholder { color: var(--text-3); font-weight: 400; }

    .helper { font-size: .74rem; color: var(--text-3); line-height: 1.4; }

    /* ── PRIMARY BUTTON ── */
    .btn-primary {
      width: 100%;
      padding: 13px 20px;
      font-size: .9rem;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-h) 100%);
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: transform .15s var(--ease), box-shadow .2s var(--ease), opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: var(--shadow-glow);
    }
    .btn-primary:active:not(:disabled) {
      transform: translateY(0) scale(.98);
      box-shadow: none;
    }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    /* Shimmer sweep on hover */
    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0; left: -60%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
      transform: skewX(-20deg);
      transition: left .5s ease;
    }
    .btn-primary:hover:not(:disabled)::after { left: 120%; }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.28);
      transform: scale(0);
      animation: rippleOut .55s var(--ease) forwards;
      pointer-events: none;
    }
    @keyframes rippleOut {
      to { transform: scale(2.5); opacity: 0; }
    }

    .btn-spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .btn-primary.loading .btn-spinner { display: block; }
    .btn-primary.loading .btn-text    { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PLAYER CHIP ── */
    .player-chip {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      background: var(--primary-light);
      border: 1px solid var(--primary-border);
      border-radius: var(--r-sm);
      animation: chipIn .3s var(--spring);
    }
    .player-chip.visible { display: flex; }
    @keyframes chipIn {
      from { opacity: 0; transform: scale(.95) translateY(-4px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .player-avatar {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-h));
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(16,185,129,.3);
    }
    .player-info .player-name { font-size: .875rem; font-weight: 600; color: var(--text); }
    .player-info .player-pts  { font-size: .78rem; color: var(--text-2); margin-top: 1px; }

    /* ── STATUS MESSAGES ── */
    .status-msg {
      padding: 10px 14px;
      border-radius: var(--r-sm);
      font-size: .82rem;
      font-weight: 500;
      display: none;
      animation: statusIn .2s var(--ease);
    }
    .status-msg.visible   { display: block; }
    .status-msg.error     { background: var(--error-bg); color: var(--error); }
    .status-msg.warning   { background: var(--warn-bg); color: var(--warn); }
    .status-msg.info      { background: var(--primary-light); color: var(--primary-dark); }
    @keyframes statusIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESULT CARD ── */
    .result-card {
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: resultReveal .4s var(--spring);
    }
    @keyframes resultReveal {
      from { opacity: 0; transform: scale(.96) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .result-header {
      background: linear-gradient(135deg, var(--primary-light), rgba(236,253,245,.5));
      border-bottom: 1px solid var(--primary-border);
      padding: 14px 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .result-header-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }
    .result-header-label {
      font-size: .74rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--primary-dark);
    }

    .result-body {
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .position-display { text-align: center; padding: 4px 0 8px; }

    .position-num {
      font-size: 4.2rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -3px;
      background: linear-gradient(135deg, var(--text) 0%, var(--primary-h) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .position-label {
      font-size: .82rem;
      color: var(--text-2);
      margin-top: 6px;
    }

    .divider { height: 1px; background: var(--border); }

    .info-rows { display: flex; flex-direction: column; gap: 12px; }

    .info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      animation: rowIn .35s var(--ease) both;
    }
    .info-row:nth-child(1) { animation-delay: 50ms; }
    .info-row:nth-child(2) { animation-delay: 120ms; }
    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .info-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: .95rem;
    }
    .info-icon.green  { background: var(--primary-light); }
    .info-icon.yellow { background: var(--warn-bg); }

    .info-text { flex: 1; }
    .info-title { font-size: .92rem; font-weight: 600; color: var(--text); }
    .info-sub   { font-size: .78rem; color: var(--text-2); margin-top: 2px; }

    /* ── HIDDEN ── */
    .hidden { display: none !important; }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      font-size: .72rem;
      color: var(--text-3);
      margin-top: 4px;
      line-height: 1.6;
    }
    .footer a {
      color: var(--text-3);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color .15s;
    }
    .footer a:hover { color: var(--primary); }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      body { padding: 28px 12px 56px; }
      .position-num { font-size: 3.4rem; letter-spacing: -2px; }
    }
  </style>
</head>
<body>

  <button class="lang-btn" id="lang-btn" onclick="toggleLanguage()">EN</button>

  <div class="wrapper">

    <!-- HEADER -->
    <header class="header">
      <div class="logo-row">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12.5 2C8.36 2 5 5.36 5 9.5c0 2.38 1.09 4.5 2.8 5.91L3.71 19.5a1 1 0 0 0 0 1.41l.71.71a1 1 0 0 0 1.41 0l4.09-4.09A7.46 7.46 0 0 0 12.5 17C16.64 17 20 13.64 20 9.5S16.64 2 12.5 2zm0 13a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
            <circle cx="11" cy="8" r="1"/><circle cx="14" cy="8" r="1"/><circle cx="12.5" cy="11" r="1"/>
          </svg>
        </div>
        <span class="app-name">What's My Ranking</span>
      </div>
      <p class="app-sub" id="app-sub">Simulateur de classement padel français</p>
      <div class="update-badge" id="update-badge">
        <span class="badge-dot"></span>
        <span id="update-text">Chargement des données…</span>
      </div>
    </header>

    <!-- MAIN CARD -->
    <div class="card" id="main-card">

      <!-- Gender -->
      <div class="gender-selector">
        <button class="gender-btn active" id="btn-men"   onclick="setGender('men')">Hommes</button>
        <button class="gender-btn"        id="btn-women" onclick="setGender('women')">Femmes</button>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="tab-license" onclick="setTab('license')">Licence TenUP</button>
        <button class="tab"        id="tab-manual"  onclick="setTab('manual')">Mes points</button>
        <div class="tab-indicator" id="tab-indicator"></div>
      </div>

      <!-- Panel: License -->
      <div class="panel active" id="panel-license">
        <div class="input-group">
          <label id="lbl-license" for="license-input">Numéro de licence</label>
          <input type="text" id="license-input" maxlength="20"
                 placeholder="ex: 0611234567"
                 oninput="onLicenseInput()"
                 onkeydown="if(event.key==='Enter') searchByLicense()" />
          <p class="helper" id="hlp-license">Votre numéro de licence FFT / TenUP</p>
        </div>
        <div class="player-chip" id="player-chip">
          <div class="player-avatar" id="player-avatar">?</div>
          <div class="player-info">
            <div class="player-name" id="player-name">—</div>
            <div class="player-pts"  id="player-pts">—</div>
          </div>
        </div>
        <div class="status-msg" id="license-status"></div>
        <button class="btn-primary" id="license-btn" onclick="searchByLicense()">
          <span class="btn-spinner"></span>
          <span class="btn-text" id="lbl-search-btn">Trouver ma position</span>
        </button>
      </div>

      <!-- Panel: Manual -->
      <div class="panel" id="panel-manual">
        <div class="input-group">
          <label id="lbl-points" for="points-input">Mes points actuels</label>
          <input type="number" id="points-input" min="0" placeholder="ex: 450"
                 onkeydown="if(event.key==='Enter') simulatePosition()" />
          <p class="helper" id="hlp-points">Points de la dernière mise à jour officielle</p>
        </div>
        <div class="status-msg" id="points-status"></div>
        <button class="btn-primary" id="points-btn" onclick="simulatePosition()" disabled>
          <span class="btn-spinner"></span>
          <span class="btn-text" id="lbl-calc-btn">Calculer ma position</span>
        </button>
      </div>

    </div>

    <!-- RESULT CARD -->
    <div class="result-card hidden" id="result-card">
      <div class="result-header">
        <div class="result-header-dot"></div>
        <span class="result-header-label" id="result-header-label">Votre classement</span>
      </div>
      <div class="result-body" id="result-body"></div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <p id="footer-text">Données officielles FFT · <a href="https://padelmagazine.fr/classement-padel/" target="_blank" rel="noopener">Padel Magazine</a> · Mise à jour automatique chaque 1er jeudi du mois</p>
    </footer>

  </div>

<script>
// ── STATE ──────────────────────────────────────────
let rankData   = { men: [], women: [] };
let playerData = null;
let playerDataLoading = false;
let currentGender = "men";
let currentTab    = "license";
let lang          = "fr";
let dataReady     = false;

// ── TRANSLATIONS ───────────────────────────────────
const T = {
  fr: {
    appSub:       "Simulateur de classement padel français",
    dataReady:    "Données du",
    menBtn:       "Hommes", womenBtn: "Femmes",
    tabLicense:   "Licence TenUP", tabManual: "Mes points",
    lblLicense:   "Numéro de licence",
    hlpLicense:   "Votre numéro de licence FFT / TenUP",
    searchBtn:    "Trouver ma position",
    lblPoints:    "Mes points actuels",
    hlpPoints:    "Points de la dernière mise à jour officielle",
    calcBtn:      "Calculer ma position",
    resultHeader: "Votre classement",
    posLabel:     "dans le classement padel",
    noGap:        "Vous êtes exactement à ce palier",
    currentPts:   "Vos points actuels",
    noData:       "Pas de données pour ce genre. Réessayez après la prochaine mise à jour.",
    errLoad:      "Erreur de chargement des données.",
    errInvalid:   "Veuillez entrer un nombre valide.",
    errLicEmpty:  "Veuillez entrer un numéro de licence.",
    errNotFound:  "Licence introuvable. Essayez la saisie manuelle.",
    errPlayersNA: "Recherche par licence disponible après la prochaine mise à jour automatique (1er jeudi du mois).",
    errBeyondMax: "Vous dépassez le maximum — félicitations !",
    playerFound:  "Joueur trouvé",
    ptsUnit:      "pts",
    toReach:      "pour atteindre la position",

  },

    resultHeader: "Your ranking",
    posLabel:     "in the padel ranking",

    currentPts:   "Your current points",

    errLoad:      "Error loading data.",
    errInvalid:   "Please enter a valid number.",

const t = k => T[lang][k] ?? k;

// ── DATA LOADING ───────────────────────────────────
async function loadData() {
  try {
    const res = await fetch("data.json");
    if (!res.ok) throw new Error();
    const json = await res.json();
    rankData.men   = json.men   || [];
    rankData.women = json.women || [];
    window._lastUpdated = json.updated || null;
    setUpdateBadge(window._lastUpdated);
    dataReady = true;
    document.getElementById("points-btn").disabled = false;
  } catch (_) {
    setUpdateBadge(null, true);
  }
}

function setUpdateBadge(dateStr, error = false) {
  const el  = document.getElementById("update-text");
  const dot = document.querySelector(".badge-dot");
  if (error) {
    el.textContent = t("errLoad");
    dot.style.background = "#EF4444";
    dot.style.animation  = "none";
    return;
  }
  el.textContent = dateStr ? `${t("dataReady")} ${formatDate(dateStr)}` : "…";
}

function formatDate(iso) {
  try {
    return new Date(iso).toLocaleDateString(lang === "fr" ? "fr-FR" : "en-GB",
      { day: "numeric", month: "long", year: "numeric" });
  } catch { return iso; }
}

// ── GENDER & TAB ───────────────────────────────────
function setGender(g) {
  currentGender = g;
  document.getElementById("btn-men").classList.toggle("active",   g === "men");
  document.getElementById("btn-women").classList.toggle("active", g === "women");
  playerData = null;
  hidePlayerChip(); hideResult();
  clearStatus("license-status"); clearStatus("points-status");
}

function setTab(tab) {
  currentTab = tab;
  document.getElementById("tab-license").classList.toggle("active", tab === "license");
  document.getElementById("tab-manual").classList.toggle("active",  tab === "manual");
  document.getElementById("panel-license").classList.toggle("active", tab === "license");
  document.getElementById("panel-manual").classList.toggle("active",  tab === "manual");
  // Slide indicator
  document.getElementById("tab-indicator").style.left = tab === "license" ? "0" : "50%";
  hideResult();
  clearStatus("license-status"); clearStatus("points-status");
}

// ── PLAYERS LAZY-LOAD ──────────────────────────────
async function loadPlayers() {
  if (playerData !== null) return playerData;
  if (playerDataLoading) return null;
  playerDataLoading = true;
  const file = currentGender === "men" ? "players_men.json" : "players_women.json";
  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error();
    playerData = await res.json();
    return playerData;
  } catch (_) {
    return null;
  } finally {
    playerDataLoading = false;
  }
}

// ── LICENSE SEARCH ─────────────────────────────────
function onLicenseInput() { hidePlayerChip(); hideResult(); clearStatus("license-status"); }

async function searchByLicense() {
  const raw = document.getElementById("license-input").value.trim();
  if (!raw) { showStatus("license-status", t("errLicEmpty"), "error"); return; }

  const btn = document.getElementById("license-btn");
  btn.classList.add("loading"); btn.disabled = true;
  clearStatus("license-status"); hidePlayerChip(); hideResult();

  try {
    const players = await loadPlayers();
    if (!players) { showStatus("license-status", t("errPlayersNA"), "warning"); return; }

    const found = players[raw];
    if (found) { showPlayerChip(raw, found.n, found.p); computeAndShowResult(found.p); return; }

    if (/[a-zA-ZÀ-ÿ]/.test(raw) && raw.length >= 3) {
      const q = raw.toLowerCase();
      const hits = Object.entries(players).filter(([,v]) => v.n?.toLowerCase().includes(q));
      if (hits.length === 1) {
        const [lic, d] = hits[0];
        showPlayerChip(lic, d.n, d.p); computeAndShowResult(d.p); return;
      }
      if (hits.length > 1) {
        showStatus("license-status", `${hits.length} joueurs trouvés — affinez votre recherche.`, "info"); return;
      }
    }
    showStatus("license-status", t("errNotFound"), "error");
  } finally {
    btn.classList.remove("loading"); btn.disabled = false;
  }
}

function showPlayerChip(license, name, points) {
  const initials = name
    ? name.split(" ").map(w => w[0]).slice(0,2).join("").toUpperCase()
    : license.slice(0,2).toUpperCase();
  document.getElementById("player-avatar").textContent = initials;
  document.getElementById("player-name").textContent   = name || `Licence ${license}`;
  document.getElementById("player-pts").textContent    = `${points.toLocaleString()} ${t("ptsUnit")} · ${t("playerFound")}`;
  document.getElementById("player-chip").classList.add("visible");
}
function hidePlayerChip() { document.getElementById("player-chip").classList.remove("visible"); }

// ── MANUAL SIMULATION ──────────────────────────────
function simulatePosition() {
  const val = parseInt(document.getElementById("points-input").value, 10);
  clearStatus("points-status"); hideResult();
  if (isNaN(val) || val < 0) { showStatus("points-status", t("errInvalid"), "error"); return; }
  computeAndShowResult(val);
}

// ── CORE LOGIC ─────────────────────────────────────
function computeAndShowResult(inputPoints) {
  const table = rankData[currentGender];
  if (!table?.length) {
    showStatus(currentTab === "license" ? "license-status" : "points-status", t("noData"), "warning");
    return;
  }

  const maxPts = Math.max(...table.map(([,p]) => p));
  if (inputPoints > maxPts) { showResultCard(null, inputPoints, 0, null, true); return; }

  const desc = [...table].sort((a,b) => b[1] - a[1]);
  let bestPos = null;
  for (const [pos, pts] of desc) {
    if (inputPoints >= pts) { bestPos = pos; break; }
  }

  let gap = 0, nextPos = null;
  if (!bestPos) {
    const easiest = desc[desc.length - 1];
    bestPos = easiest[0]; gap = easiest[1] - inputPoints; nextPos = bestPos;
  } else {
    const better = desc.filter(([pos]) => pos < bestPos);
    if (better.length) {
      const next = better[better.length - 1]; // min pts among better = closest tier
      gap = next[1] - inputPoints; nextPos = next[0];
    }
  }

  showResultCard(bestPos, inputPoints, gap, nextPos, false);
}

// ── RESULT DISPLAY ─────────────────────────────────
function showResultCard(position, points, gap, nextPos, isMax) {
  const card = document.getElementById("result-card");
  const body = document.getElementById("result-body");
  document.getElementById("result-header-label").textContent = t("resultHeader");

  if (isMax) {
    body.innerHTML = `
      <div class="position-display">
        <div class="position-num" style="font-size:3.5rem;letter-spacing:0">🏆</div>
        <div class="position-label">${t("errBeyondMax")}</div>
      </div>`;
  } else {
    const locale = lang === "fr" ? "fr-FR" : "en-GB";
    body.innerHTML = `
      <div class="position-display">
        <div class="position-num" id="pos-num">#—</div>
        <div class="position-label">${t("posLabel")}</div>
      </div>
      <div class="divider"></div>
      <div class="info-rows">
        <div class="info-row">
          <div class="info-icon green">🎯</div>
          <div class="info-text">
            <div class="info-title">${points.toLocaleString(locale)} ${t("ptsUnit")}</div>
            <div class="info-sub">${t("currentPts")}</div>
          </div>
        </div>
        ${gap > 0 && nextPos ? `
        <div class="info-row">
          <div class="info-icon yellow">⬆️</div>
          <div class="info-text">
            <div class="info-title">+${gap.toLocaleString(locale)} ${t("ptsUnit")}</div>
            <div class="info-sub">${t("toReach")} #${nextPos.toLocaleString(locale)}</div>
          </div>
        </div>` : `
        <div class="info-row">
          <div class="info-icon green">✅</div>
          <div class="info-text">
            <div class="info-title">${t("noGap")}</div>
          </div>
        </div>`}
      </div>`;

    animateCount(document.getElementById("pos-num"), 0, position, 750, locale);
  }

  card.classList.remove("hidden");
  card.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function hideResult() { document.getElementById("result-card").classList.add("hidden"); }

// ── ANIMATED COUNTER ───────────────────────────────
function animateCount(el, from, to, duration, locale) {
  const start = performance.now();
  const run = now => {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 4); // ease-out quart
    const val  = Math.round(from + (to - from) * ease);
    el.textContent = "#" + val.toLocaleString(locale);
    if (p < 1) requestAnimationFrame(run);
  };
  requestAnimationFrame(run);
}

// ── RIPPLE ─────────────────────────────────────────
document.addEventListener("click", e => {
  const btn = e.target.closest(".btn-primary");
  if (!btn || btn.disabled) return;
  const r    = document.createElement("span");
  const d    = Math.max(btn.offsetWidth, btn.offsetHeight);
  const rect = btn.getBoundingClientRect();
  r.className = "ripple";
  r.style.cssText = `width:${d}px;height:${d}px;left:${e.clientX-rect.left-d/2}px;top:${e.clientY-rect.top-d/2}px`;
  btn.querySelector(".ripple")?.remove();
  btn.appendChild(r);
});

// ── STATUS ─────────────────────────────────────────
function showStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `status-msg visible ${type}`;
}
function clearStatus(id) {
  const el = document.getElementById(id);
  el.className = "status-msg"; el.textContent = "";
}

// ── LANGUAGE ───────────────────────────────────────
function toggleLanguage() {
  lang = lang === "fr" ? "en" : "fr";
  document.getElementById("lang-btn").textContent = lang === "fr" ? "EN" : "FR";
  document.documentElement.lang = lang;
  document.getElementById("app-sub").textContent        = t("appSub");
  document.getElementById("btn-men").textContent        = t("menBtn");
  document.getElementById("btn-women").textContent      = t("womenBtn");
  document.getElementById("tab-license").textContent    = t("tabLicense");
  document.getElementById("tab-manual").textContent     = t("tabManual");
  document.getElementById("lbl-license").textContent    = t("lblLicense");
  document.getElementById("hlp-license").textContent    = t("hlpLicense");
  document.getElementById("lbl-search-btn").textContent = t("searchBtn");
  document.getElementById("lbl-points").textContent     = t("lblPoints");
  document.getElementById("hlp-points").textContent     = t("hlpPoints");
  document.getElementById("lbl-calc-btn").textContent   = t("calcBtn");
  document.getElementById("footer-text").innerHTML      = t("footerText");
  setUpdateBadge(window._lastUpdated || null);
}

// ── INIT ───────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => loadData());
</script>
